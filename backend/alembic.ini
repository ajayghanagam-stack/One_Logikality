[alembic]
script_location = alembic
# Make `app` importable when alembic is invoked from backend/ (e.g. during
# start-dev.sh) without the venv being on sys.path for packages.
prepend_sys_path = .
# sqlalchemy.url is populated at runtime from app.config.settings.database_url
# (see alembic/env.py). Leave blank here on purpose.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
